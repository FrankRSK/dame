<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dame (Version 0.03)</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            width: 480px;
            height: 480px;
            margin: 0 auto;
            border: 4px solid #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .square {
            width: 58px;
            height: 58px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .square.light {
            background: #f4e4bc;
        }

        .square.dark {
            background: #8b4513;
        }

        .square.highlighted {
            box-shadow: inset 0 0 20px #ffff00;
            transform: scale(1.05);
        }

        .square.possible-move {
            box-shadow: inset 0 0 15px #00ff00;
        }

        .piece {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 10;
        }

        .piece.red {
            background: radial-gradient(circle, #ff4757, #c44569);
            color: white;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        .piece.black {
            background: radial-gradient(circle, #2f3542, #1e2130);
            color: white;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(47, 53, 66, 0.4);
        }

        .piece.selected {
            transform: scale(1.2) translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
            border-color: #ffd700;
        }

        .piece.king {
            font-size: 20px;
        }

        .piece.king::before {
            content: '♔';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(238, 90, 82, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(238, 90, 82, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .volume-control {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .volume-slider {
            width: 100px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            transition: background 0.3s;
        }

        .volume-slider::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .game-mode {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }

        .game-mode label {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .game-mode input[type="radio"] {
            margin-right: 8px;
        }

        .game-mode select {
            margin-left: 10px;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .piece.jumping {
            animation: jump 0.6s ease-in-out;
        }

        @keyframes capture {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.3) rotate(180deg); opacity: 0.5; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .piece.captured {
            animation: capture 0.8s ease-in-out forwards;
        }

        .status {
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: bold;
            min-height: 25px;
        }

        @keyframes promotion {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.5) rotate(90deg); }
            50% { transform: scale(0.8) rotate(180deg); }
            75% { transform: scale(1.3) rotate(270deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        .piece.promoting {
            animation: promotion 1s ease-in-out;
        }

        .footer-links {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 0.9em;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: white;
            text-decoration: underline;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.3);
            transform: scale(0.7) translateY(-50px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 400px;
            width: 90%;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-title {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: celebrate 1s ease-in-out;
        }

        .modal-message {
            font-size: 1.3em;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            min-width: 120px;
        }

        .modal-button.primary {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            box-shadow: 0 4px 15px rgba(238, 90, 82, 0.4);
        }

        .modal-button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(238, 90, 82, 0.6);
        }

        .modal-button.secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .modal-button.secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            75% { transform: scale(1.1) rotate(5deg); }
        }

        .winner-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔴 Dame Spiel ⚫</h1>
        
        <div class="game-info">
            <div>Aktueller Spieler: <span id="current-player">Rot</span></div>
            <div>Rot: <span id="red-pieces">12</span> | Schwarz: <span id="black-pieces">12</span></div>
        </div>

        <div class="game-mode">
            <div style="margin-bottom: 15px;">
                <label style="margin-right: 15px;">
                    <input type="radio" name="gameMode" value="human" checked> Spieler vs Spieler
                </label>
                <label>
                    <input type="radio" name="gameMode" value="ai"> Spieler vs KI
                </label>
            </div>
            <div id="ai-settings" style="display: none;">
                <label for="difficulty">KI Schwierigkeit: </label>
                <select id="difficulty" style="padding: 5px 10px; border-radius: 5px; border: none; background: rgba(255,255,255,0.9);">
                    <option value="1">Einfach</option>
                    <option value="3" selected>Normal</option>
                    <option value="5">Schwer</option>
                    <option value="7">Experte</option>
                </select>
                <div style="margin-top: 10px; font-size: 0.9em;">
                    <span id="ai-thinking" style="display: none;">🤖 KI denkt nach...</span>
                </div>
            </div>
        </div>

        <div class="board" id="board"></div>

        <div class="controls">
            <button onclick="newGame()">Neues Spiel</button>
            <button onclick="toggleSound()" id="sound-btn">🔊 Sound An</button>
        </div>

        <div class="volume-control">
            <span>🔇</span>
            <input type="range" class="volume-slider" id="volume" min="0" max="100" value="50">
            <span>🔊</span>
        </div>

        <div class="status" id="status">Rot ist am Zug</div>

        <div class="footer-links">
            <a href="https://spiele.frank-kemper.com/" target="_blank">Datenschutz</a>
            <a href="https://spiele.frank-kemper.com/" target="_blank">Impressum</a>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div class="modal-overlay" id="gameOverModal">
        <div class="modal-content">
            <div class="winner-icon" id="winnerIcon">🏆</div>
            <div class="modal-title" id="modalTitle">Spiel beendet!</div>
            <div class="modal-message" id="modalMessage">Herzlichen Glückwunsch!</div>
            <div class="modal-buttons">
                <button class="modal-button primary" onclick="closeModalAndNewGame()">
                    Neues Spiel
                </button>
                <button class="modal-button secondary" onclick="closeModal()">
                    Spiel ansehen
                </button>
            </div>
        </div>
    </div>

    <script>
        class CheckersGame {
            constructor() {
                this.board = this.initializeBoard();
                this.currentPlayer = 'red';
                this.selectedPiece = null;
                this.possibleMoves = [];
                this.soundEnabled = true;
                this.volume = 0.5;
                this.redPieces = 12;
                this.blackPieces = 12;
                this.gameOver = false;
                this.mustCapture = false;
                this.captureSequence = [];
                this.gameMode = 'human';
                this.aiDifficulty = 3;
                this.aiThinking = false;
                
                this.initializeAudio();
                this.createBoard();
                this.updateDisplay();
                this.setupEventListeners();
            }

            initializeBoard() {
                const board = Array(8).fill(null).map(() => Array(8).fill(null));
                
                // Platziere schwarze Steine
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 8; col++) {
                        if ((row + col) % 2 === 1) {
                            board[row][col] = { color: 'black', isKing: false };
                        }
                    }
                }
                
                // Platziere rote Steine
                for (let row = 5; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        if ((row + col) % 2 === 1) {
                            board[row][col] = { color: 'red', isKing: false };
                        }
                    }
                }
                
                return board;
            }

            initializeAudio() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                this.sounds = {
                    move: () => this.playTone(440, 0.1),
                    capture: () => this.playTone(220, 0.2),
                    king: () => this.playChord([523, 659, 784], 0.3),
                    win: () => this.playMelody([523, 587, 659, 698, 784], 0.1)
                };
            }

            playTone(frequency, duration) {
                if (!this.soundEnabled) return;
                
                try {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime);
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0, this.audioContext.currentTime);
                    gainNode.gain.linearRampToValueAtTime(this.volume * 0.3, this.audioContext.currentTime + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);
                    
                    oscillator.start(this.audioContext.currentTime);
                    oscillator.stop(this.audioContext.currentTime + duration);
                } catch (e) {
                    console.log('Audio error:', e);
                }
            }

            playChord(frequencies, duration) {
                frequencies.forEach(freq => this.playTone(freq, duration));
            }

            playMelody(frequencies, noteDuration) {
                frequencies.forEach((freq, index) => {
                    setTimeout(() => this.playTone(freq, noteDuration), index * noteDuration * 1000);
                });
            }

            createBoard() {
                const boardElement = document.getElementById('board');
                boardElement.innerHTML = '';
                
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const square = document.createElement('div');
                        square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                        square.dataset.row = row;
                        square.dataset.col = col;
                        square.addEventListener('click', () => this.handleSquareClick(row, col));
                        
                        const piece = this.board[row][col];
                        if (piece) {
                            const pieceElement = document.createElement('div');
                            pieceElement.className = `piece ${piece.color}${piece.isKing ? ' king' : ''}`;
                            square.appendChild(pieceElement);
                        }
                        
                        boardElement.appendChild(square);
                    }
                }
            }

            handleSquareClick(row, col) {
                if (this.gameOver || this.aiThinking) return;
                if (this.gameMode === 'ai' && this.currentPlayer === 'black') return;

                const piece = this.board[row][col];

                // Wenn ein Stein ausgewählt ist und auf ein leeres Feld geklickt wird
                if (this.selectedPiece && !piece) {
                    const move = this.possibleMoves.find(m => m.to.row === row && m.to.col === col);
                    if (move) {
                        this.makeMove(move);
                        return;
                    }
                }

                // Wenn auf einen eigenen Stein geklickt wird
                if (piece && piece.color === this.currentPlayer) {
                    this.selectPiece(row, col);
                } else {
                    // Deselektieren wenn auf etwas anderes geklickt wird
                    this.clearSelection();
                }
            }

            selectPiece(row, col) {
                this.clearHighlights();
                this.selectedPiece = { row, col };
                
                const square = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                const pieceElement = square.querySelector('.piece');
                
                square.classList.add('highlighted');
                if (pieceElement) {
                    pieceElement.classList.add('selected');
                }
                
                this.possibleMoves = this.getPossibleMoves(row, col);
                this.highlightPossibleMoves();
                
                this.sounds.move();
            }

            getPossibleMoves(row, col) {
                const piece = this.board[row][col];
                if (!piece) return [];

                const moves = [];
                const directions = piece.isKing ? 
                    [[-1, -1], [-1, 1], [1, -1], [1, 1]] : 
                    piece.color === 'red' ? [[-1, -1], [-1, 1]] : [[1, -1], [1, 1]];

                // Prüfe zuerst auf obligatorische Sprungzüge
                const jumpMoves = this.getJumpMoves(row, col, directions);
                
                // Wenn der aktuelle Spieler Sprungzüge hat, müssen diese gespielt werden
                if (jumpMoves.length > 0 || this.hasCaptureMoves()) {
                    return jumpMoves;
                }

                // Normale Züge nur wenn keine Sprünge möglich sind
                for (const [dRow, dCol] of directions) {
                    const newRow = row + dRow;
                    const newCol = col + dCol;
                    
                    if (this.isValidPosition(newRow, newCol) && !this.board[newRow][newCol]) {
                        moves.push({
                            from: { row, col },
                            to: { row: newRow, col: newCol },
                            type: 'move'
                        });
                    }
                }

                return moves;
            }

            getJumpMoves(row, col, directions) {
                const moves = [];
                const piece = this.board[row][col];
                
                for (const [dRow, dCol] of directions) {
                    const middleRow = row + dRow;
                    const middleCol = col + dCol;
                    const jumpRow = row + 2 * dRow;
                    const jumpCol = col + 2 * dCol;
                    
                    if (this.isValidPosition(jumpRow, jumpCol) && 
                        !this.board[jumpRow][jumpCol] &&
                        this.isValidPosition(middleRow, middleCol) &&
                        this.board[middleRow][middleCol] &&
                        this.board[middleRow][middleCol].color !== piece.color) {
                        
                        const move = {
                            from: { row, col },
                            to: { row: jumpRow, col: jumpCol },
                            type: 'jump',
                            captured: { row: middleRow, col: middleCol }
                        };
                        
                        // Prüfe auf weitere Sprünge nach diesem Zug
                        const tempBoard = this.simulateMove(this.board, move);
                        const tempPiece = tempBoard[jumpRow][jumpCol];
                        const tempDirections = tempPiece.isKing ? 
                            [[-1, -1], [-1, 1], [1, -1], [1, 1]] : 
                            tempPiece.color === 'red' ? [[-1, -1], [-1, 1]] : [[1, -1], [1, 1]];
                        
                        const chainMoves = this.getJumpMovesOnBoard(tempBoard, jumpRow, jumpCol, tempDirections);
                        if (chainMoves.length > 0) {
                            move.chainMoves = chainMoves;
                        }
                        
                        moves.push(move);
                    }
                }
                
                return moves;
            }

            getJumpMovesOnBoard(board, row, col, directions) {
                const moves = [];
                const piece = board[row][col];
                
                for (const [dRow, dCol] of directions) {
                    const middleRow = row + dRow;
                    const middleCol = col + dCol;
                    const jumpRow = row + 2 * dRow;
                    const jumpCol = col + 2 * dCol;
                    
                    if (this.isValidPosition(jumpRow, jumpCol) && 
                        !board[jumpRow][jumpCol] &&
                        this.isValidPosition(middleRow, middleCol) &&
                        board[middleRow][middleCol] &&
                        board[middleRow][middleCol].color !== piece.color) {
                        
                        moves.push({
                            from: { row, col },
                            to: { row: jumpRow, col: jumpCol },
                            type: 'jump',
                            captured: { row: middleRow, col: middleCol }
                        });
                    }
                }
                
                return moves;
            }

            makeMove(move) {
                const piece = this.board[move.from.row][move.from.col];
                
                // Bewege den Stein
                this.board[move.to.row][move.to.col] = piece;
                this.board[move.from.row][move.from.col] = null;
                
                // Behandle Sprungzug
                if (move.type === 'jump') {
                    const capturedPiece = this.board[move.captured.row][move.captured.col];
                    this.board[move.captured.row][move.captured.col] = null;
                    
                    if (capturedPiece.color === 'red') {
                        this.redPieces--;
                    } else {
                        this.blackPieces--;
                    }
                    
                    this.sounds.capture();
                } else {
                    this.sounds.move();
                }
                
                // Prüfe auf Damenwandlung
                const shouldPromote = (piece.color === 'red' && move.to.row === 0) ||
                                    (piece.color === 'black' && move.to.row === 7);
                
                if (shouldPromote && !piece.isKing) {
                    piece.isKing = true;
                    this.sounds.king();
                }
                
                // Prüfe auf weitere Sprünge
                if (move.type === 'jump' && move.chainMoves && move.chainMoves.length > 0) {
                    this.selectedPiece = { row: move.to.row, col: move.to.col };
                    this.possibleMoves = move.chainMoves;
                    
                    this.createBoard();
                    this.selectPiece(move.to.row, move.to.col);
                    this.updateDisplay();
                    return;
                }
                
                this.clearSelection();
                this.switchPlayer();
                this.createBoard();
                this.updateDisplay();
                this.checkGameEnd();
            }

            switchPlayer() {
                this.currentPlayer = this.currentPlayer === 'red' ? 'black' : 'red';
                
                // KI-Zug nach einer kurzen Verzögerung
                if (this.gameMode === 'ai' && this.currentPlayer === 'black' && !this.gameOver) {
                    this.aiThinking = true;
                    document.getElementById('ai-thinking').style.display = 'inline';
                    
                    setTimeout(() => {
                        this.makeAIMove();
                        this.aiThinking = false;
                        document.getElementById('ai-thinking').style.display = 'none';
                    }, 500 + Math.random() * 1500);
                }
            }

            hasCaptureMoves() {
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const piece = this.board[row][col];
                        if (piece && piece.color === this.currentPlayer) {
                            const directions = piece.isKing ? 
                                [[-1, -1], [-1, 1], [1, -1], [1, 1]] : 
                                piece.color === 'red' ? [[-1, -1], [-1, 1]] : [[1, -1], [1, 1]];
                            
                            if (this.getJumpMoves(row, col, directions).length > 0) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            highlightPossibleMoves() {
                this.possibleMoves.forEach(move => {
                    const square = document.querySelector(`[data-row="${move.to.row}"][data-col="${move.to.col}"]`);
                    if (square) {
                        square.classList.add('possible-move');
                    }
                });
            }

            clearHighlights() {
                document.querySelectorAll('.square').forEach(square => {
                    square.classList.remove('highlighted', 'possible-move');
                });
                document.querySelectorAll('.piece').forEach(piece => {
                    piece.classList.remove('selected');
                });
            }

            clearSelection() {
                this.selectedPiece = null;
                this.possibleMoves = [];
                this.clearHighlights();
            }

            isValidPosition(row, col) {
                return row >= 0 && row < 8 && col >= 0 && col < 8;
            }

            updateDisplay() {
                document.getElementById('current-player').textContent = 
                    this.currentPlayer === 'red' ? 'Rot' : 'Schwarz';
                document.getElementById('red-pieces').textContent = this.redPieces;
                document.getElementById('black-pieces').textContent = this.blackPieces;
                
                if (!this.gameOver) {
                    document.getElementById('status').textContent = 
                        `${this.currentPlayer === 'red' ? 'Rot' : 'Schwarz'} ist am Zug`;
                }
            }

            checkGameEnd() {
                if (this.redPieces === 0) {
                    this.endGame('Schwarz gewinnt!');
                } else if (this.blackPieces === 0) {
                    this.endGame('Rot gewinnt!');
                } else if (!this.hasAnyMoves()) {
                    this.endGame(`${this.currentPlayer === 'red' ? 'Schwarz' : 'Rot'} gewinnt! (Keine Züge möglich)`);
                }
            }

            hasAnyMoves() {
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const piece = this.board[row][col];
                        if (piece && piece.color === this.currentPlayer) {
                            if (this.getPossibleMoves(row, col).length > 0) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            endGame(message) {
                this.gameOver = true;
                document.getElementById('status').textContent = message;
                this.sounds.win();
                
                setTimeout(() => {
                    this.showGameOverModal(message);
                }, 1000);
            }

            showGameOverModal(message) {
                const modal = document.getElementById('gameOverModal');
                const title = document.getElementById('modalTitle');
                const messageEl = document.getElementById('modalMessage');
                const icon = document.getElementById('winnerIcon');
                
                // Bestimme Gewinner und setze entsprechende Inhalte
                if (message.includes('Rot gewinnt')) {
                    title.textContent = 'Rot gewinnt! 🔴';
                    messageEl.textContent = 'Herzlichen Glückwunsch! Rot hat das Spiel gewonnen!';
                    icon.textContent = '🔴';
                } else if (message.includes('Schwarz gewinnt')) {
                    title.textContent = 'Schwarz gewinnt! ⚫';
                    messageEl.textContent = 'Herzlichen Glückwunsch! Schwarz hat das Spiel gewonnen!';
                    icon.textContent = '⚫';
                } else {
                    title.textContent = 'Spiel beendet!';
                    messageEl.textContent = message;
                    icon.textContent = '🏁';
                }
                
                modal.classList.add('show');
            }

            newGame() {
                this.board = this.initializeBoard();
                this.currentPlayer = 'red';
                this.selectedPiece = null;
                this.possibleMoves = [];
                this.redPieces = 12;
                this.blackPieces = 12;
                this.gameOver = false;
                this.mustCapture = false;
                this.captureSequence = [];
                this.aiThinking = false;
                
                document.getElementById('ai-thinking').style.display = 'none';
                
                this.createBoard();
                this.updateDisplay();
            }

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                const btn = document.getElementById('sound-btn');
                btn.textContent = this.soundEnabled ? '🔊 Sound An' : '🔇 Sound Aus';
            }

            setVolume(value) {
                this.volume = value / 100;
            }

            setupEventListeners() {
                document.querySelectorAll('input[name="gameMode"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        this.gameMode = e.target.value;
                        document.getElementById('ai-settings').style.display = 
                            e.target.value === 'ai' ? 'block' : 'none';
                        this.newGame();
                    });
                });

                document.getElementById('difficulty').addEventListener('change', (e) => {
                    this.aiDifficulty = parseInt(e.target.value);
                });
            }

            // KI-Methoden (vereinfacht für bessere Performance)
            makeAIMove() {
                const allMoves = this.getAllPossibleMoves(this.board, 'black');
                if (allMoves.length === 0) return;

                let bestMove;
                
                // Einfache KI: Wähle zufällig aus den besten Zügen
                const jumpMoves = allMoves.filter(move => move.type === 'jump');
                if (jumpMoves.length > 0) {
                    bestMove = jumpMoves[Math.floor(Math.random() * jumpMoves.length)];
                } else {
                    bestMove = allMoves[Math.floor(Math.random() * allMoves.length)];
                }
                
                if (bestMove) {
                    this.makeMove(bestMove);
                }
            }

            getAllPossibleMoves(board, player) {
                const moves = [];
                let hasJumps = false;

                // Zuerst prüfen ob Sprünge möglich sind
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const piece = board[row][col];
                        if (piece && piece.color === player) {
                            const directions = piece.isKing ? 
                                [[-1, -1], [-1, 1], [1, -1], [1, 1]] : 
                                piece.color === 'red' ? [[-1, -1], [-1, 1]] : [[1, -1], [1, 1]];
                            
                            const jumpMoves = this.getJumpMovesOnBoard(board, row, col, directions);
                            if (jumpMoves.length > 0) {
                                moves.push(...jumpMoves);
                                hasJumps = true;
                            }
                        }
                    }
                }

                // Wenn Sprünge möglich sind, nur diese zurückgeben
                if (hasJumps) return moves;

                // Sonst normale Züge
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const piece = board[row][col];
                        if (piece && piece.color === player) {
                            const directions = piece.isKing ? 
                                [[-1, -1], [-1, 1], [1, -1], [1, 1]] : 
                                piece.color === 'red' ? [[-1, -1], [-1, 1]] : [[1, -1], [1, 1]];
                            
                            for (const [dRow, dCol] of directions) {
                                const newRow = row + dRow;
                                const newCol = col + dCol;
                                
                                if (this.isValidPosition(newRow, newCol) && !board[newRow][newCol]) {
                                    moves.push({
                                        from: { row, col },
                                        to: { row: newRow, col: newCol },
                                        type: 'move'
                                    });
                                }
                            }
                        }
                    }
                }

                return moves;
            }

            simulateMove(board, move) {
                // Erstelle eine Kopie des Bretts
                const newBoard = board.map(row => row.map(cell => 
                    cell ? { ...cell } : null
                ));

                // Führe den Zug aus
                const piece = newBoard[move.from.row][move.from.col];
                newBoard[move.to.row][move.to.col] = piece;
                newBoard[move.from.row][move.from.col] = null;

                // Behandle Eroberung
                if (move.type === 'jump') {
                    newBoard[move.captured.row][move.captured.col] = null;
                }

                // Behandle Damenwandlung
                if (piece && !piece.isKing) {
                    if ((piece.color === 'red' && move.to.row === 0) ||
                        (piece.color === 'black' && move.to.row === 7)) {
                        piece.isKing = true;
                    }
                }

                return newBoard;
            }
        }

        // Initialisiere das Spiel
        let game;

        window.addEventListener('load', () => {
            game = new CheckersGame();
            
            // Volume Control
            document.getElementById('volume').addEventListener('input', (e) => {
                game.setVolume(e.target.value);
            });
        });

        function newGame() {
            game.newGame();
        }

        function toggleSound() {
            game.toggleSound();
        }

        function closeModal() {
            document.getElementById('gameOverModal').classList.remove('show');
        }

        function closeModalAndNewGame() {
            closeModal();
            setTimeout(() => {
                game.newGame();
            }, 300);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'n' || e.key === 'N') {
                newGame();
            } else if (e.key === 's' || e.key === 'S') {
                toggleSound();
            }
        });
    </script>
</body>
</html>
